name: Terraform Plan
on:
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS Credentials (access key)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -input=false -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=order-service/terraform.tfstate"

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Verify plan file exists
        working-directory: infra/terraform
        run: |
          echo "Checking for tfplan in infra/terraform..."
          ls -la infra/terraform || true
          if [ ! -f infra/terraform/tfplan ]; then
            echo "tfplan not found at infra/terraform/tfplan. Terraform plan may have failed or created file at a different path." >&2
            exit 1
          fi
          echo "tfplan present"

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/terraform/tfplan
